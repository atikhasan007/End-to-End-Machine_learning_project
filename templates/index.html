<!DOCTYPE html>
<html>
<head>
    <title>Wine Quality Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">🍷 Wine Quality Prediction</h2>

        <form action="/predict" method="POST">

            <div class="row">

                <div class="col-md-6">
                    <input type="text" name="fixed acidity" class="form-control mb-2" placeholder="Fixed Acidity" required>
                    <input type="text" name="volatile acidity" class="form-control mb-2" placeholder="Volatile Acidity" required>
                    <input type="text" name="citric acid" class="form-control mb-2" placeholder="Citric Acid" required>
                    <input type="text" name="residual sugar" class="form-control mb-2" placeholder="Residual Sugar" required>
                    <input type="text" name="chlorides" class="form-control mb-2" placeholder="Chlorides" required>
                </div>

                <div class="col-md-6">
                    <input type="text" name="free sulfur dioxide" class="form-control mb-2" placeholder="Free Sulfur Dioxide" required>
                    <input type="text" name="total sulfur dioxide" class="form-control mb-2" placeholder="Total Sulfur Dioxide" required>
                    <input type="text" name="density" class="form-control mb-2" placeholder="Density" required>
                    <input type="text" name="ph" class="form-control mb-2" placeholder="pH" required>
                    <input type="text" name="sulphates" class="form-control mb-2" placeholder="Sulphates" required>
                    <input type="text" name="alcohol" class="form-control mb-2" placeholder="Alcohol" required>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">Predict</button>

        </form>

    </div>
</div>

</body>
</html>
